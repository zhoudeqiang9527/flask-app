name: Build and Deploy to OpenShift

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: ${{ vars.PROJECT }}
  APP_NAME: ${{ vars.APP_NAME }}
  IMAGE_NAME: ${{ vars.APP_NAME }}
  REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.repository_owner }}
  IMAGE_URI: ${{ format('ghcr.io/{0}/{1}', github.repository, vars.APP_NAME) }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ env.GHCR_USERNAME }}
        password: ${{ secrets.GHCR_TOKEN }}
    
    - name: Build and push image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:latest .
        docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_URI }}:latest
        docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.IMAGE_URI }}:${{ github.sha }}
        docker push ${{ env.IMAGE_URI }}:latest
        docker push ${{ env.IMAGE_URI }}:${{ github.sha }}

    - name: Verify GHCR image access
      run: |
        echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ env.GHCR_USERNAME }}" --password-stdin
        docker pull ${{ env.IMAGE_URI }}:latest
    
    - name: Install OpenShift CLI
      run: |
        curl -fsSLO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
        tar -xzf openshift-client-linux.tar.gz
        sudo mv oc kubectl /usr/local/bin/
        oc version --client

    - name: Setup kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Configure GHCR pull secret
      run: |
        oc project ${{ env.PROJECT }}

        oc create secret docker-registry ghcr-creds \
          --docker-server=${{ env.REGISTRY }} \
          --docker-username=${{ env.GHCR_USERNAME }} \
          --docker-password='${{ secrets.GHCR_TOKEN }}' \
          --docker-email=dummy@example.com \
          -n ${{ env.PROJECT }} \
          --dry-run=client -o yaml | oc apply -f -

        oc secrets link default ghcr-creds --for=pull -n ${{ env.PROJECT }}

    - name: Deploy
      run: |
        set -euo pipefail

        oc project ${{ env.PROJECT }}

        oc delete all -l app=${{ env.APP_NAME }} -n ${{ env.PROJECT }} 2>/dev/null || true
        sleep 5

        oc new-app --name=${{ env.APP_NAME }} --image=${{ env.IMAGE_URI }}:latest -n ${{ env.PROJECT }}
        oc expose svc/${{ env.APP_NAME }} -n ${{ env.PROJECT }} || true

        oc get all -n ${{ env.PROJECT }}
        oc get pods -n ${{ env.PROJECT }} -o wide
        oc describe deployment/${{ env.APP_NAME }} -n ${{ env.PROJECT }} || true
        oc describe pods -l app=${{ env.APP_NAME }} -n ${{ env.PROJECT }} || true
        oc logs -l app=${{ env.APP_NAME }} -n ${{ env.PROJECT }} --all-containers=true --tail=200 || true
        oc get events -n ${{ env.PROJECT }} --sort-by=.metadata.creationTimestamp | tail -n 30 || true

        oc rollout status deployment/${{ env.APP_NAME }} -n ${{ env.PROJECT }} --timeout=180s
    
    - name: Show Application URL
      run: |
        ROUTE_URL=$(oc get route ${{ env.APP_NAME }} -n ${{ env.PROJECT }} -o jsonpath='http://{.spec.host}' 2>/dev/null)
        echo "✅ 部署完成！"
        echo "📍 访问地址: $ROUTE_URL"