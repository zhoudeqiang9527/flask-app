name: Build and Deploy to OpenShift

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: ${{ vars.PROJECT }}
  APP_NAME: ${{ vars.APP_NAME }}
  IMAGE_NAME: ${{ vars.APP_NAME }}
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}
    
    - name: Build and push image
      run: |
        docker build -t ${{ env.IMAGE_NAME }}:latest .
        docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
        docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Install OpenShift CLI
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/4.19/openshift-client-linux.tar.gz
        tar xzf openshift-client-linux.tar.gz
        sudo mv oc kubectl /usr/local/bin/
    
    - name: Setup kubeconfig and Deploy
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
        
        oc project ${{ env.PROJECT }}
        
        # 删除旧部署
        oc delete all -l app=${{ env.APP_NAME }} -n ${{ env.PROJECT }} 2>/dev/null || true
        sleep 5
        
        # 部署新应用
        oc new-app --name=${{ env.APP_NAME }} --image=${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest -n ${{ env.PROJECT }}
        oc expose svc/${{ env.APP_NAME }} -n ${{ env.PROJECT }} || true
        oc rollout status deployment/${{ env.APP_NAME }} -n ${{ env.PROJECT }} --timeout=90s
    
    - name: Show Application URL
      run: |
        ROUTE_URL=$(oc get route ${{ env.APP_NAME }} -n ${{ env.PROJECT }} -o jsonpath='http://{.spec.host}' 2>/dev/null)
        echo "✅ 部署完成！"
        echo "📍 访问地址: $ROUTE_URL"