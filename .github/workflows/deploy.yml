name: Build and Deploy to OpenShift

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: zdq-project
  APP_NAME: flask-app-cicd           # OpenShift 中的应用名
  IMAGE_NAME: flask-app-cicd         # GitHub 中的镜像名
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to GHCR
      run: |
        echo "${{ secrets.GHCR_TOKEN }}" | podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
    
    - name: Build and push image
      run: |
        podman build -t ${{ env.IMAGE_NAME }}:latest .
        podman tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
        podman tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        podman push ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
        podman push ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Install oc
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/4.19/openshift-client-linux.tar.gz
        tar xzf openshift-client-linux.tar.gz
        sudo mv oc kubectl /usr/local/bin/
    
    - name: Deploy to OpenShift
      run: |
        oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }} --insecure-skip-tls-verify=true
        oc project ${{ env.PROJECT }}
        
        # 删除旧部署
        oc delete all -l app=${{ env.APP_NAME }} -n ${{ env.PROJECT }} 2>/dev/null || true
        
        # 新建部署
        oc new-app --name=${{ env.APP_NAME }} --image=${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest -n ${{ env.PROJECT }}
        oc expose svc/${{ env.APP_NAME }} -n ${{ env.PROJECT }}
        oc rollout status deployment/${{ env.APP_NAME }} -n ${{ env.PROJECT }} --timeout=60s
    
    - name: Show URL
      run: |
        echo "✅ 部署完成！"
        echo "📍 http://$(oc get route ${{ env.APP_NAME }} -n ${{ env.PROJECT }} -o jsonpath='{.spec.host}')"